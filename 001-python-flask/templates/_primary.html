<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>001-python-flask</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="keywords" content="Flask, Python, Web Development, OAuth">
        <meta name="description"
              content="A simple Flask application for demonstrating OAuth">
        <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        main { width: 80%; max-width: 400px; margin: 0 auto; }
        h1 { color: #333; }
        p { color: #666; }
        .env-banner {
            padding: 6px 16px;
            text-align: center;
            font-weight: bold;
            font-size: 0.85em;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .env-banner--dev     { background-color: #003078; color: #ffffff; }
        .env-banner--staging { background-color: #f47738; color: #ffffff; }
        .env-banner--prod    { background-color: #00703c; color: #ffffff; }
        </style>
    </head>
    <body>
        <div class="env-banner env-banner--{{ environment }}">{{ environment }} environment</div>
        <main>
            {% block content %}
            {% endblock content %}
        </main>
    </body>
</html>
